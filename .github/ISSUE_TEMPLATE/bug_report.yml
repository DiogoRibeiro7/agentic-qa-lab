name: Bug report
description: Report a reproducible defect with expected and actual behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please include enough detail for us to reproduce and validate a fix quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share exact steps and relevant inputs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Paste stack traces, screenshots, or links to failing CI runs.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and relevant dependency versions.
      placeholder: "Windows 11, Python 3.11.9, Poetry 1.8.x"
