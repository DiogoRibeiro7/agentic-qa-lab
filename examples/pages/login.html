<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agentic-qa-lab — login demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 22rem; margin: 4rem auto; }
      input, button { display: block; width: 100%; padding: 0.5rem; margin: 0.4rem 0; }
      #result { margin-top: 1rem; font-weight: 600; }
      [data-state="success"] { color: #0a7d28; }
    </style>
  </head>
  <body>
    <h1>Sign in</h1>
    <form id="login-form" onsubmit="return false;">
      <input id="username" name="username" placeholder="Username" autocomplete="off" />
      <input id="password" name="password" type="password" placeholder="Password" />
      <button id="submit" type="button">Sign in</button>
    </form>
    <div id="result"></div>

    <!-- External so the success marker text is not present in the page's
         serialized DOM until the script renders it. -->
    <script src="login.js"></script>
  </body>
</html>
